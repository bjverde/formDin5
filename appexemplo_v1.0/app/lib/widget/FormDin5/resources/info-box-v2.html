<!--[main]-->
<div class="info-box card" style="background-color: {$cardColor}; color: {$fontColor};">
    <span class="info-box-icon bg-{$background}">
        <i class="{$icon}" style="color: {$iconColor};" aria-hidden="true"></i>
    </span>

    <div class="info-box-content">
      <span class="info-box-text" style="color: {$fontColor};">{$title}</span>
      <span class="info-box-number" style="color: {$fontColor};">{$value}</span>
    </div>
</div>
<!--[/main]-->
